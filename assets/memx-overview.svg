<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">MemX coarse architecture</title>
  <desc id="desc">Agents enter through native hooks or MCP, MemX compiles turns and queries, retrieves from a SQLite memory store, and maintains memory in the background.</desc>
  <defs>
    <linearGradient id="panel" x1="0" x2="1200" y1="0" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#F3F7FA"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto">
      <path d="M1 1L8 5L1 9" stroke="#6B7C8F" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect x="18" y="18" width="1164" height="484" rx="24" fill="url(#panel)" stroke="#D7E0EA"/>
  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="60" y="74" fill="#15202B" font-size="26" font-weight="720">Coarse architecture</text>
    <text x="60" y="106" fill="#5A6B7C" font-size="17">One local memory layer for native hooks and MCP clients.</text>

    <g>
      <rect x="64" y="160" width="190" height="96" rx="18" fill="#FFFFFF" stroke="#CAD6E1"/>
      <text x="159" y="197" text-anchor="middle" fill="#162232" font-size="18" font-weight="700">Agents</text>
      <text x="159" y="226" text-anchor="middle" fill="#627386" font-size="14">Codex · Claude Code</text>
      <text x="159" y="247" text-anchor="middle" fill="#627386" font-size="14">OpenClaw · MCP clients</text>
    </g>

    <g>
      <rect x="318" y="136" width="210" height="144" rx="18" fill="#FFFFFF" stroke="#CAD6E1"/>
      <text x="423" y="174" text-anchor="middle" fill="#162232" font-size="18" font-weight="700">Integration layer</text>
      <text x="423" y="204" text-anchor="middle" fill="#627386" font-size="14">native plugin + hooks</text>
      <text x="423" y="226" text-anchor="middle" fill="#627386" font-size="14">or stdio MCP server</text>
      <text x="423" y="252" text-anchor="middle" fill="#2D7C70" font-size="13" font-weight="650">exec-form commands</text>
    </g>

    <g>
      <rect x="592" y="82" width="232" height="126" rx="18" fill="#FFFFFF" stroke="#BFD8D0"/>
      <text x="708" y="120" text-anchor="middle" fill="#15202B" font-size="18" font-weight="700">Recall path</text>
      <text x="708" y="151" text-anchor="middle" fill="#5E6F7F" font-size="14">query compiler</text>
      <text x="708" y="173" text-anchor="middle" fill="#5E6F7F" font-size="14">hybrid retrieval + graph hints</text>
      <text x="708" y="195" text-anchor="middle" fill="#2D7C70" font-size="13" font-weight="650">inject compact evidence</text>
    </g>

    <g>
      <rect x="592" y="284" width="232" height="126" rx="18" fill="#FFFFFF" stroke="#C9D5EA"/>
      <text x="708" y="322" text-anchor="middle" fill="#15202B" font-size="18" font-weight="700">Write path</text>
      <text x="708" y="353" text-anchor="middle" fill="#5E6F7F" font-size="14">turn compiler</text>
      <text x="708" y="375" text-anchor="middle" fill="#5E6F7F" font-size="14">LLM semantic extraction</text>
      <text x="708" y="397" text-anchor="middle" fill="#405F9A" font-size="13" font-weight="650">facts · events · entities · edges</text>
    </g>

    <g>
      <rect x="886" y="148" width="238" height="144" rx="18" fill="#FFFFFF" stroke="#CAD6E1"/>
      <text x="1005" y="187" text-anchor="middle" fill="#15202B" font-size="18" font-weight="700">SQLite memory store</text>
      <text x="1005" y="217" text-anchor="middle" fill="#5E6F7F" font-size="14">FTS/BM25 + embeddings</text>
      <text x="1005" y="239" text-anchor="middle" fill="#5E6F7F" font-size="14">source segments + graph</text>
      <text x="1005" y="265" text-anchor="middle" fill="#5A6472" font-size="13" font-weight="650">local-first, inspectable</text>
    </g>

    <g>
      <rect x="314" y="430" width="572" height="48" rx="16" fill="#EDF7F4" stroke="#BFD8D0"/>
      <text x="600" y="461" text-anchor="middle" fill="#2F685E" font-size="15" font-weight="680">Maintenance loop: consolidate, correct, promote, keep sources linked</text>
    </g>

    <path d="M254 208H306" stroke="#6B7C8F" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M528 184C548 160 562 146 586 144" stroke="#6B7C8F" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M528 230C552 288 558 342 586 346" stroke="#6B7C8F" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M824 145H880" stroke="#6B7C8F" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M824 347C912 342 958 314 986 296" stroke="#6B7C8F" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M1005 292C991 420 900 454 892 454" stroke="#6B7C8F" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M308 454C230 438 159 342 159 262" stroke="#6B7C8F" stroke-width="2" marker-end="url(#arrow)"/>
  </g>
</svg>
