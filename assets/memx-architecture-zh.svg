<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">memX 架构图</title>
  <desc id="desc">memX 长期记忆能力的简洁概览。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="720" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="0.48" stop-color="#172033"/>
      <stop offset="1" stop-color="#0B1120"/>
    </linearGradient>
    <linearGradient id="center" x1="410" y1="172" x2="790" y2="548" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E6F1FF"/>
      <stop offset="1" stop-color="#BFD7FF"/>
    </linearGradient>
    <linearGradient id="blue" x1="96" y1="142" x2="356" y2="292" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4F9BFF"/>
      <stop offset="1" stop-color="#74D4FF"/>
    </linearGradient>
    <linearGradient id="green" x1="844" y1="142" x2="1104" y2="292" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5EE0B8"/>
      <stop offset="1" stop-color="#B4E86C"/>
    </linearGradient>
    <linearGradient id="purple" x1="96" y1="428" x2="356" y2="578" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8B7CFF"/>
      <stop offset="1" stop-color="#E18BFF"/>
    </linearGradient>
    <linearGradient id="gold" x1="844" y1="428" x2="1104" y2="578" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFBE55"/>
      <stop offset="1" stop-color="#FFE27A"/>
    </linearGradient>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#020617" flood-opacity="0.34"/>
    </filter>
    <style>
      .title { font: 800 48px "Noto Sans SC", "PingFang SC", "Microsoft YaHei", Inter, sans-serif; fill: #F8FAFC; letter-spacing: 0; }
      .subtitle { font: 500 19px "Noto Sans SC", "PingFang SC", "Microsoft YaHei", Inter, sans-serif; fill: #C7D2E5; letter-spacing: 0; }
      .centerTitle { font: 900 42px "Noto Sans SC", "PingFang SC", "Microsoft YaHei", Inter, sans-serif; fill: #0F172A; letter-spacing: 0; }
      .centerSmall { font: 600 16px "Noto Sans SC", "PingFang SC", "Microsoft YaHei", Inter, sans-serif; fill: #334155; letter-spacing: 0; }
      .cardTitle { font: 800 25px "Noto Sans SC", "PingFang SC", "Microsoft YaHei", Inter, sans-serif; fill: #F8FAFC; letter-spacing: 0; }
      .cardText { font: 600 16px "Noto Sans SC", "PingFang SC", "Microsoft YaHei", Inter, sans-serif; fill: #ECF3FF; letter-spacing: 0; }
      .darkTitle { font: 800 25px "Noto Sans SC", "PingFang SC", "Microsoft YaHei", Inter, sans-serif; fill: #172033; letter-spacing: 0; }
      .darkText { font: 600 16px "Noto Sans SC", "PingFang SC", "Microsoft YaHei", Inter, sans-serif; fill: #334155; letter-spacing: 0; }
      .pill { font: 700 15px "Noto Sans SC", "PingFang SC", "Microsoft YaHei", Inter, sans-serif; fill: #DDEAFE; letter-spacing: 0; }
    </style>
  </defs>

  <rect width="1200" height="720" rx="34" fill="url(#bg)"/>
  <circle cx="1020" cy="96" r="142" fill="#FFFFFF" opacity="0.04"/>
  <circle cx="136" cy="620" r="168" fill="#FFFFFF" opacity="0.035"/>

  <text x="72" y="78" class="title">memX Memory</text>
  <text x="72" y="112" class="subtitle">长期记忆：记住工作，连接关系，学习习惯，自动整理，只召回有用证据。</text>

  <g filter="url(#shadow)">
    <rect x="405" y="202" width="390" height="270" rx="34" fill="url(#center)"/>
    <text x="600" y="306" text-anchor="middle" class="centerTitle">memX</text>
    <text x="600" y="344" text-anchor="middle" class="centerSmall">给 agent 用的长期记忆</text>
    <rect x="464" y="382" width="272" height="42" rx="21" fill="#0F172A" opacity="0.88"/>
    <text x="600" y="408" text-anchor="middle" class="pill">回答时注入关键证据</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="96" y="156" width="286" height="154" rx="28" fill="url(#blue)"/>
    <text x="239" y="207" text-anchor="middle" class="cardTitle">记住工作</text>
    <text x="239" y="240" text-anchor="middle" class="cardText">事实、偏好、任务</text>
    <text x="239" y="266" text-anchor="middle" class="cardText">事件、决策、上下文</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="818" y="156" width="286" height="154" rx="28" fill="url(#green)"/>
    <text x="961" y="207" text-anchor="middle" class="darkTitle">连接关系</text>
    <text x="961" y="240" text-anchor="middle" class="darkText">项目、人、工具</text>
    <text x="961" y="266" text-anchor="middle" class="darkText">文件、资源、结果</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="96" y="424" width="286" height="154" rx="28" fill="url(#purple)"/>
    <text x="239" y="475" text-anchor="middle" class="cardTitle">学习习惯</text>
    <text x="239" y="508" text-anchor="middle" class="cardText">协作偏好</text>
    <text x="239" y="534" text-anchor="middle" class="cardText">常用工作方式</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="818" y="424" width="286" height="154" rx="28" fill="url(#gold)"/>
    <text x="961" y="475" text-anchor="middle" class="darkTitle">自动整理</text>
    <text x="961" y="508" text-anchor="middle" class="darkText">更新、纠错</text>
    <text x="961" y="534" text-anchor="middle" class="darkText">过期状态、证据来源</text>
  </g>

  <path d="M390 234C430 238 455 247 492 277" stroke="#93C5FD" stroke-width="5" stroke-linecap="round" opacity="0.68"/>
  <path d="M810 234C770 238 745 247 708 277" stroke="#A7F3D0" stroke-width="5" stroke-linecap="round" opacity="0.68"/>
  <path d="M390 506C430 501 456 488 492 451" stroke="#D8B4FE" stroke-width="5" stroke-linecap="round" opacity="0.68"/>
  <path d="M810 506C770 501 744 488 708 451" stroke="#FDE68A" stroke-width="5" stroke-linecap="round" opacity="0.68"/>
</svg>
